<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" width="400" height="110">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a45c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1a33;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a45c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8863a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagonal abstract network node -->
  <g transform="translate(25, 55)">
    <!-- Outer hexagon -->
    <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20"
             fill="none" stroke="#c8a45c" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner hexagon -->
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
             fill="#0b1a33" stroke="#c8a45c" stroke-width="1.2" opacity="0.85"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#c8a45c" opacity="0.95"/>
    <!-- Connection lines (network nodes) -->
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#c8a45c" stroke-width="0.8" opacity="0.4"/>
    <line x1="-11.3" y1="-6.5" x2="11.3" y2="6.5" stroke="#c8a45c" stroke-width="0.8" opacity="0.4"/>
    <line x1="-11.3" y1="6.5" x2="11.3" y2="-6.5" stroke="#c8a45c" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Text: PROCON -->
  <text x="85" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="36" font-weight="800" letter-spacing="4" fill="#0b1a33">
    PROCON
  </text>

  <!-- Separator line -->
  <line x1="85" y1="58" x2="370" y2="58" stroke="url(#barGrad)" stroke-width="1.8"/>

  <!-- Subtitle -->
  <text x="85" y="78" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" letter-spacing="1.2" fill="#6b7280">
    INTERNATIONAL WORKSHOP ON
  </text>
  <text x="85" y="92" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" letter-spacing="1.2" fill="#6b7280">
    PROGRAMMABILITY FOR CLOUD NETWORKS AND APPLICATIONS
  </text>

  <!-- Gold accent bar -->
  <rect x="85" y="97" width="40" height="2.5" rx="1.25" fill="url(#accentGrad)"/>
</svg>
